    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8faf9 0%, #eef2f0 50%, #f0f4f8 100%);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .property-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .progress-fill {
            transition: width 1.5s ease-in-out;
            background: linear-gradient(90deg, #10b981, #34d399);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-green {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes urgentPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .view-enter {
            animation: fadeSlideIn 0.5s ease-out both;
        }

        .pulse-dot {
            animation: pulse-green 2s infinite;
        }

        .terminal-cursor {
            animation: blink 1s step-end infinite;
        }

        .urgent-badge {
            animation: urgentPulse 1.5s ease-in-out infinite;
        }

        .btn-hover {
            transition: all 0.25s ease;
        }

        .btn-hover:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.25);
        }

        .btn-hover:active {
            transform: scale(0.97);
        }

        .card-premium {
            transition: all 0.3s ease;
            border: 1px solid rgba(229, 231, 235, 0.8);
        }

        .card-premium:hover {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        }

        @media (max-width: 768px) {
            .sidebar-desktop {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar-desktop.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0 !important;
            }

            .hamburger {
                display: flex !important;
            }
        }
    </style>
</head>

                            {[
                                { k: 'Status', v: '✅ LIVE (Operational since 2026-01-15)', c: 'text-emerald-400' },
                                { k: 'Uptime', v: '847 days', c: 'text-emerald-400' },
                                { k: 'Users', v: '1 family (4 members, 2 female)', c: 'text-blue-400' },
                                { k: 'GPS', v: '12.7231° N, 105.4192° E', c: 'text-yellow-400' },
                                { k: 'Spec', v: 'Improved Toilet (Grade A, flush+septic)', c: 'text-cyan-400' },
                                { k: 'Owner', v: 'Jason Chan', c: 'text-purple-400' },
                                { k: 'Build Time', v: '42 days (SLA: 60 days ✅)', c: 'text-emerald-400' },

                                    <div class="flex items-end gap-3">

                                        <span class="text-emerald-400 text-sm font-bold mb-1 flex items-center gap-1 bg-emerald-50 px-2 py-1 rounded-lg">

                                        <div class="flex items-end gap-2">

                            <p class="text-[10px] text-gray-400">完成度</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const WalletView = () => {
            const total = TRANSACTIONS.reduce((s, t) => s + t.amount, 0);
            return (
                <div class="p-8 view-enter">
                    <header class="mb-8 text-left">
                        <h1 class="text-3xl font-bold text-gray-900">我的錢包</h1>

                            <p class="text-4xl font-bold text-emerald-500 mt-2">HK${TRANSACTIONS[0].amount}</p>

                    <div class="card-premium bg-white rounded-[32px] p-8 shadow-sm text-left">

                                    </div>
                                    <div class="text-right">

                                </div>
                            ))}

        };

        // --- Main App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('portfolio');
            const [selectedProp, setSelectedProp] = useState(null);
            const [isShareModalOpen, setIsShareModalOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, selectedProp, isShareModalOpen]);

            return (
                <div class="min-h-screen">
                    <Sidebar activeTab={activeTab} setActiveTab={(t) => { setActiveTab(t); setSelectedProp(null); }} />
                    <main class="ml-64 min-h-screen main-content">
                        {selectedProp ? (
                            <DetailView property={selectedProp} onBack={() => setSelectedProp(null)} onShare={() => setIsShareModalOpen(true)} />
                        ) : activeTab === 'explore' ? (
                            <ExploreView onSelect={setSelectedProp} />
                        ) : activeTab === 'portfolio' ? (
                            <PortfolioView onShare={() => setIsShareModalOpen(true)} />
                        ) : activeTab === 'teamup' ? (
                            <TeamUpView />
                        ) : activeTab === 'rewards' ? (
                            <RewardsView />
                        ) : activeTab === 'wallet' ? (
                            <WalletView />
                        ) : (
                            <div class="p-8 flex items-center justify-center h-screen text-gray-300 italic">
                                模塊開發中 (Coming Soon)...
                            </div>
                        )}
                    </main>
                    <ShareModal
                        isOpen={isShareModalOpen}
                        onClose={() => setIsShareModalOpen(false)}
                        property={selectedProp || PROPERTIES[0]}

                </div>

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
